name: Deno

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check || true

      - name: Lint
        run: deno lint || true

      - name: Run tests
        run: deno test || true